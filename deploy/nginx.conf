##############################################################
# Nginx configuration for minigame.npgslot.com
# Server: 108.165.255.110
# App port: 3001 (Node.js / Express)
##############################################################

server {
    listen 80;
    server_name minigame.npgslot.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name minigame.npgslot.com;

    # ── SSL (Let's Encrypt / Certbot) ──────────────────────
    ssl_certificate     /etc/letsencrypt/live/minigame.npgslot.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/minigame.npgslot.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ───────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Allow iframes from any origin (for game embedding)
    # Override X-Frame-Options per-location if needed
    add_header Content-Security-Policy "frame-ancestors *;" always;

    # ── Gzip ───────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 6;

    # ── Proxy to Node.js app ───────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Static assets caching ─────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host $host;
        expires            30d;
        add_header         Cache-Control "public, immutable";
    }

    # ── API routes (no cache) ─────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         Cache-Control "no-store, no-cache";
    }

    # ── Logs ──────────────────────────────────────────────
    access_log /var/log/nginx/minigame-access.log;
    error_log  /var/log/nginx/minigame-error.log;
}
